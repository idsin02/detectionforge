
metadata:
  id: DF-0001
  name: Suspicious PowerShell
  description: Detect encoded PowerShell execution
  version: "1.0"
  author: Dhruv Singh
  tags:
    - powershell
    - execution
  references:
    - https://attack.mitre.org/techniques/T1059/001/

environment:
  platform: windows
  hostname: WIN11-LAB
  os: Windows 11
  architecture: x64

attack:
  provider: atomic
  technique: T1059.001
  test: 5
  timeout: 120
  parameters:
    command: calc.exe

telemetry:
  collector: evtx
  sources:
    - Microsoft-Windows-Sysmon/Operational
    - Security

validation:
  backend: hayabusa
  detections:
    sigma:
      - rules/powershell.yml

reporting:
  formats:
    - markdown
    - json
  output: reports/
